name: 🚀 Android Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'

jobs:
  build-apk:
    name: 📦 Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Cache pub dependencies for faster subsequent builds
      - name: 📦 Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # Cache Gradle for faster Android builds
      - name: 🐘 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos

      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceApp-Release-APK
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Auto-create GitHub Release when a version tag is pushed
  release:
    name: 🏷️ Create GitHub Release
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: FinanceApp-Release-APK
          path: ./artifacts/

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FinanceApp ${{ github.ref_name }}
          body: |
            ## 🪙 FinanceApp ${{ github.ref_name }}

            ### 📱 Download
            - **APK** — Install langsung ke perangkat Android

            ### 📋 Changelog
            Lihat commit log untuk detail perubahan.
          files: |
            artifacts/app-release.apk
          draft: false
          prerelease: false

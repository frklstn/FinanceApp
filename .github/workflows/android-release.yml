name: 🚀 Android Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.32.2'
  JAVA_VERSION: '17'

jobs:
  build-apk:
    name: 📦 Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📋 Flutter info
        run: flutter doctor -v

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos

      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      - name: 🏗️ Build Release App Bundle (AAB)
        run: flutter build appbundle --release

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceApp-Release-APK
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceApp-Release-AAB
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # Auto-create GitHub Release when a version tag is pushed
  release:
    name: 🏷️ Create GitHub Release
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: FinanceApp-Release-APK
          path: ./artifacts/

      - name: 📥 Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: FinanceApp-Release-AAB
          path: ./artifacts/

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FinanceApp ${{ github.ref_name }}
          body: |
            ## 🪙 FinanceApp ${{ github.ref_name }}

            ### 📱 Download
            - **APK** — Install langsung ke perangkat Android
            - **AAB** — Upload ke Google Play Store

            ### 📋 Changelog
            Lihat commit log untuk detail perubahan.
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab
          draft: false
          prerelease: false
